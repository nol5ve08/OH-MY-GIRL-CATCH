<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>술래잡기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#1e1e1e;--card:#2a2a2a;--border:#444;--text:#fff;--muted:rgba(255,255,255,.4);--green:#4ade80;--red:#ef4444}
  html,body{height:100%;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;-webkit-font-smoothing:antialiased;touch-action:none}
  .screen{display:none;width:100%;height:100dvh;flex-direction:column}.screen.active{display:flex}
  .btn-main{background:#fff;color:#111;border:none;padding:14px 60px;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,opacity .2s}
  .btn-main:hover{opacity:.9}.btn-main:active{transform:scale(.96)}.btn-main:disabled{opacity:.3;cursor:not-allowed}
  .input-line{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:12px 4px;width:280px;text-align:center;outline:none;transition:border-color .2s}
  .input-line::placeholder{color:var(--muted)}.input-line:focus{border-color:rgba(255,255,255,.6)}
  #loginScreen{align-items:center;justify-content:center;gap:20px}.login-title{font-size:clamp(2rem,5vw,3.2rem);font-weight:900}
  .lobby-header{padding:20px 24px 12px;font-size:14px;color:var(--muted);border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
  .user-name{color:var(--text);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}.user-name:hover{text-decoration:underline}
  .room-list{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}.room-list::-webkit-scrollbar{width:6px}.room-list::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
  .room-card{background:transparent;border:1px solid var(--border);border-radius:8px;padding:20px 24px;cursor:pointer;position:relative;transition:background .2s,border-color .2s}.room-card:hover{background:rgba(255,255,255,.03);border-color:#666}
  .room-number{font-size:12px;color:var(--muted);margin-bottom:8px}.room-title{font-size:22px;font-weight:900;margin-bottom:4px}.room-host,.room-count{font-size:13px;color:var(--muted);margin-bottom:2px}
  .room-status{position:absolute;bottom:20px;right:24px;font-size:16px;font-weight:700}.room-status.waiting{color:var(--muted)}.room-status.playing{color:var(--text)}
  .room-dot{position:absolute;top:20px;right:24px;width:12px;height:12px;border-radius:50%}.room-dot.waiting{background:var(--red)}.room-dot.playing{background:var(--green)}.room-card.locked .room-title::after{content:' 🔒';font-size:14px}
  .lobby-bottom{padding:16px 24px 24px;display:flex;gap:10px;justify-content:center;border-top:1px solid rgba(255,255,255,.06)}
  .btn-sec{background:transparent;color:var(--muted);border:1px solid var(--border);padding:14px 30px;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}.btn-sec:hover{border-color:#666;color:var(--text)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}.modal-overlay.active{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:380px;max-width:90vw}.modal-title{font-size:20px;font-weight:900;margin-bottom:24px;text-align:center}
  .modal-field{margin-bottom:18px}.modal-label{font-size:13px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between}.modal-label .optional{font-size:11px;color:rgba(255,255,255,.25)}
  .modal-input{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:15px;padding:10px 2px;width:100%;outline:none}.modal-input::placeholder{color:rgba(255,255,255,.2)}.modal-input:focus{border-color:rgba(255,255,255,.5)}
  .modal-buttons{display:flex;gap:10px;margin-top:28px}.modal-btn{flex:1;padding:12px 0;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border:none}.modal-btn.primary{background:#fff;color:#111}.modal-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .waiting-header{padding:20px 24px;display:flex;align-items:baseline;gap:16px;border-bottom:1px solid rgba(255,255,255,.06)}.waiting-room-info{font-size:22px;font-weight:900}.waiting-room-meta{font-size:13px;color:var(--muted);display:flex;gap:12px}
  .waiting-back{position:absolute;top:20px;right:24px;background:none;border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:20px;font-family:'Noto Sans KR',sans-serif;font-size:12px;cursor:pointer}
  .char-select-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}.char-carousel{display:flex;align-items:center;gap:16px}
  .char-option{width:70px;height:70px;border-radius:50%;cursor:pointer;transition:transform .25s cubic-bezier(.16,1,.3,1),box-shadow .25s;border:3px solid transparent;opacity:.6}.char-option:hover{transform:scale(1.1);opacity:.8}.char-option.selected{width:110px;height:110px;opacity:1;border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.15)}
  .char-name{font-size:16px;font-weight:700}.ready-btn{background:transparent;color:var(--green);border:2px solid var(--green);padding:14px 80px;border-radius:50px;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}.ready-btn:hover,.ready-btn.readied{background:var(--green);color:#111}
  .player-slots{display:flex;gap:14px;justify-content:center;padding:20px 24px 28px;border-top:1px solid rgba(255,255,255,.06);flex-wrap:wrap}.player-slot{display:flex;flex-direction:column;align-items:center;gap:6px}
  .player-avatar{width:52px;height:52px;border-radius:50%;border:3px solid #333;background:#333}.player-avatar.ready{border-color:var(--green)}.player-avatar.not-ready{border-color:var(--red)}.player-avatar.empty{background:#2a2a2a;border-color:#333}.player-name{font-size:11px;color:var(--muted);max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #gameScreen{position:relative;align-items:center;justify-content:center;background:#76a946}canvas{image-rendering:auto;display:block}
  .game-hud{position:absolute;top:12px;left:12px;font-size:13px;pointer-events:none;background:rgba(38,55,27,.72);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:8px 12px;z-index:10}.game-exit{position:absolute;top:12px;right:12px;background:rgba(38,55,27,.72);border:1px solid rgba(255,255,255,.18);color:#fff;padding:6px 14px;border-radius:16px;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;z-index:10}
  .joystick{position:absolute;bottom:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);z-index:20;display:none;touch-action:none}.joystick.left{left:30px}.joystick.right{right:30px}.joystick-knob{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.2);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}.joystick-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(255,255,255,.1);backdrop-filter:blur(12px);color:var(--text);font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:transform .4s cubic-bezier(.16,1,.3,1),opacity .4s;pointer-events:none;z-index:200}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .no-rooms{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}@media(pointer:coarse){.joystick{display:block}}
</style>
</head>
<body>
<div class="screen active" id="loginScreen"><div class="login-title">술래잡기</div><input class="input-line" id="loginId" placeholder="아이디를 입력해주세요" maxlength="12" autocomplete="off"/><button class="btn-main" id="loginBtn">입장하기</button></div>
<div class="screen" id="lobbyScreen"><div class="lobby-header"><span>대기방</span><span class="user-name" id="lobbyUserName"></span></div><div class="room-list" id="roomList"></div><div class="lobby-bottom"><button class="btn-sec" id="refreshBtn">새로고침</button><button class="btn-main" id="createRoomBtn">방만들기</button></div></div>
<div class="modal-overlay" id="createModal"><div class="modal"><div class="modal-title">방 만들기</div><div class="modal-field"><div class="modal-label">방 제목</div><input class="modal-input" id="roomTitleInput" placeholder="방 제목을 입력하세요" maxlength="20" autocomplete="off"/></div><div class="modal-field"><div class="modal-label">비밀번호<span class="optional">선택사항</span></div><input class="modal-input" id="roomPwInput" placeholder="미입력 시 공개방" maxlength="10" type="password" autocomplete="off"/></div><div class="modal-buttons"><button class="modal-btn secondary" id="createCancelBtn">취소</button><button class="modal-btn primary" id="createConfirmBtn">만들기</button></div></div></div>
<div class="modal-overlay" id="pwModal"><div class="modal" style="text-align:center"><div class="modal-title">🔒 비밀번호 입력</div><div class="modal-field"><input class="modal-input" id="pwEntry" placeholder="비밀번호를 입력하세요" type="password" autocomplete="off"/></div><div class="modal-buttons"><button class="modal-btn secondary" id="pwCancelBtn">취소</button><button class="modal-btn primary" id="pwConfirmBtn">입장</button></div></div></div>
<div class="modal-overlay" id="nickModal"><div class="modal" style="text-align:center"><div class="modal-title">닉네임 수정</div><div class="modal-field"><input class="modal-input" id="nickInput" placeholder="새 닉네임" maxlength="12" autocomplete="off"/></div><div class="modal-buttons"><button class="modal-btn secondary" id="nickCancelBtn">취소</button><button class="modal-btn primary" id="nickConfirmBtn">변경</button></div></div></div>
<div class="screen" id="waitingScreen"><div class="waiting-header"><span class="waiting-room-info" id="waitingRoomInfo"></span><span class="waiting-room-meta" id="waitingRoomMeta"></span></div><button class="waiting-back" id="waitingBackBtn">나가기</button><div class="char-select-area"><div class="char-carousel" id="charCarousel"></div><div class="char-name" id="charName"></div><button class="btn-main" id="startBtn" style="display:none">시작하기</button><button class="ready-btn" id="readyBtn" style="display:none">준비완료</button></div><div class="player-slots" id="playerSlots"></div></div>
<div class="screen" id="gameScreen"><div class="game-hud"><div id="gameHudText"></div></div><button class="game-exit" id="gameExitBtn">나가기</button><canvas id="game" tabindex="0"></canvas><div class="joystick left" id="joyLeft"><div class="joystick-knob" id="knobLeft"></div><div class="joystick-label">시야</div></div><div class="joystick right" id="joyRight"><div class="joystick-knob" id="knobRight"></div><div class="joystick-label">이동</div></div></div>
<div class="toast" id="toast"></div>
<script>
const characters=[
  {name:'빨강이',color:'#e04040'},{name:'파랑이',color:'#4080e0'},
  {name:'초록이',color:'#40c040'},{name:'노랑이',color:'#e0c020'},
  {name:'보라이',color:'#a050e0'},{name:'주황이',color:'#e08030'}
];
const FOV=Math.PI/5, VIEW_DIST=350;
let ws=null, myName='', myId='', selectedChar=2, isHost=false, isReady=false;
let currentRoomId=null, joinTarget=null;
let gameActive=false, isSeeker=false, seekerId='', seekerName='';
let gamePlayers=[], gameWalls=[], elapsed='0';
let mapW=3000, mapH=2000;
let startOverlayTimer=0;
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function send(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d))}
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>{send({type:'set_name',name:myName});send({type:'list_rooms'})};
  ws.onclose=()=>setTimeout(connect,2000);
  ws.onmessage=e=>{
    const d=JSON.parse(e.data);
    switch(d.type){
      case 'room_list': renderRoomList(d.rooms); break;
      case 'room_joined': currentRoomId=d.roomId; isHost=d.isHost; myId=d.yourId; showScreen('waitingScreen'); break;
      case 'room_update': updateWaitingRoom(d); break;
      case 'game_start': startGame(d); break;
      case 'sync':
        gamePlayers=d.players;elapsed=d.elapsed;
        const serverMe=d.players.find(p=>p.id===myId);
        if(serverMe){
          const dx=serverMe.x-localX,dy=serverMe.y-localY;
          const diff=Math.sqrt(dx*dx+dy*dy);
          if(diff>220){localX=serverMe.x;localY=serverMe.y;localVX=0;localVY=0}
          else if(diff>30&&dx*localVX+dy*localVY>0){localX+=dx*0.08;localY+=dy*0.08}
        }
        break;
      case 'game_end': gameActive=false; showToast(d.reason); showScreen('waitingScreen'); isReady=false; break;
      case 'caught': showToast('잡혔다!'); break;
      case 'error': showToast(d.msg); break;
    }
  };
}
document.getElementById('loginBtn').onclick=()=>{
  const n=document.getElementById('loginId').value.trim();
  if(!n){showToast('아이디를 입력해주세요');return}
  myName=n;
  document.getElementById('lobbyUserName').innerHTML=n+' <span style="font-size:12px;opacity:.5">✏️</span>';
  showScreen('lobbyScreen');
  connect();
};
document.getElementById('loginId').onkeydown=e=>{if(e.key==='Enter')document.getElementById('loginBtn').click()};
document.getElementById('lobbyUserName').onclick=()=>{document.getElementById('nickInput').value=myName;document.getElementById('nickModal').classList.add('active');document.getElementById('nickInput').focus()};
document.getElementById('nickCancelBtn').onclick=()=>document.getElementById('nickModal').classList.remove('active');
document.getElementById('nickConfirmBtn').onclick=()=>{const n=document.getElementById('nickInput').value.trim();if(!n)return;myName=n;send({type:'update_name',name:n});document.getElementById('lobbyUserName').innerHTML=n+' <span style="font-size:12px;opacity:.5">✏️</span>';document.getElementById('nickModal').classList.remove('active');showToast('닉네임 변경됨')};
document.getElementById('nickModal').onclick=e=>{if(e.target.id==='nickModal')e.target.classList.remove('active')};
function renderRoomList(rooms){
  const list=document.getElementById('roomList');list.innerHTML='';
  if(!rooms||rooms.length===0){list.innerHTML='<div class="no-rooms">아직 방이 없어요. 방을 만들어보세요!</div>';return}
  for(const r of rooms){
    const c=document.createElement('div');c.className='room-card'+(r.locked?' locked':'');
    c.innerHTML=`<div class="room-number">${r.id}</div><div class="room-dot ${r.status}"></div><div class="room-title">${r.title}</div><div class="room-host">${r.host}</div><div class="room-count">${r.count} / ${r.max}</div><div class="room-status ${r.status}">${r.status==='waiting'?r.count+'명 대기중':'게임중'}</div>`;
    c.onclick=()=>{if(r.status==='playing'){showToast('게임 진행 중');return}if(r.count>=r.max){showToast('방이 가득 찼어요');return}if(r.locked){joinTarget=r.id;document.getElementById('pwModal').classList.add('active');document.getElementById('pwEntry').value='';document.getElementById('pwEntry').focus();return}send({type:'join_room',roomId:r.id,charIdx:selectedChar})};
    list.appendChild(c);
  }
}
document.getElementById('refreshBtn').onclick=()=>send({type:'list_rooms'});
document.getElementById('pwCancelBtn').onclick=()=>document.getElementById('pwModal').classList.remove('active');
document.getElementById('pwConfirmBtn').onclick=()=>{const pw=document.getElementById('pwEntry').value;if(!pw){showToast('비밀번호를 입력해주세요');return}document.getElementById('pwModal').classList.remove('active');send({type:'join_room',roomId:joinTarget,password:pw,charIdx:selectedChar})};
document.getElementById('pwEntry').onkeydown=e=>{if(e.key==='Enter')document.getElementById('pwConfirmBtn').click()};
document.getElementById('pwModal').onclick=e=>{if(e.target.id==='pwModal')e.target.classList.remove('active')};
document.getElementById('createRoomBtn').onclick=()=>{document.getElementById('createModal').classList.add('active');document.getElementById('roomTitleInput').value='';document.getElementById('roomPwInput').value='';document.getElementById('roomTitleInput').focus()};
document.getElementById('createCancelBtn').onclick=()=>document.getElementById('createModal').classList.remove('active');
document.getElementById('createConfirmBtn').onclick=()=>{const t=document.getElementById('roomTitleInput').value.trim();if(!t){showToast('방 제목을 입력해주세요');return}document.getElementById('createModal').classList.remove('active');send({type:'create_room',title:t,password:document.getElementById('roomPwInput').value.trim()||null,charIdx:selectedChar})};
document.getElementById('createModal').onclick=e=>{if(e.target.id==='createModal')e.target.classList.remove('active')};
function updateWaitingRoom(d){
  const r=d.room, pl=d.players;
  document.getElementById('waitingRoomInfo').textContent=r.id+' '+r.title;
  document.getElementById('waitingRoomMeta').innerHTML=`<span>${pl.length} / 8</span>`;
  isHost=(r.hostId===myId);
  if(isHost){document.getElementById('startBtn').style.display='';document.getElementById('readyBtn').style.display='none';const others=pl.filter(p=>p.id!==myId);document.getElementById('startBtn').disabled=!(others.length>0&&others.every(p=>p.ready))}
  else{document.getElementById('startBtn').style.display='none';document.getElementById('readyBtn').style.display=''}
  renderCharCarousel();
  const s=document.getElementById('playerSlots');s.innerHTML='';
  for(let i=0;i<8;i++){
    const sl=document.createElement('div');sl.className='player-slot';
    const av=document.createElement('div');av.className='player-avatar';
    const nm=document.createElement('div');nm.className='player-name';
    if(i<pl.length){const p=pl[i];av.style.background=characters[p.charIdx]?.color||'#888';if(p.id===r.hostId)av.classList.add('ready');else av.classList.add(p.ready?'ready':'not-ready');nm.textContent=p.name}
    else{av.classList.add('empty')}
    sl.appendChild(av);sl.appendChild(nm);s.appendChild(sl);
  }
}
function renderCharCarousel(){
  const c=document.getElementById('charCarousel');c.innerHTML='';
  characters.forEach((ch,i)=>{const e=document.createElement('div');e.className='char-option'+(i===selectedChar?' selected':'');e.style.background=ch.color;e.onclick=()=>{selectedChar=i;renderCharCarousel();send({type:'update_char',charIdx:i})};c.appendChild(e)});
  document.getElementById('charName').textContent=characters[selectedChar].name;
}
document.getElementById('readyBtn').onclick=()=>{isReady=!isReady;const b=document.getElementById('readyBtn');b.classList.toggle('readied',isReady);b.textContent=isReady?'준비취소':'준비완료';send({type:'toggle_ready'})};
document.getElementById('startBtn').onclick=()=>send({type:'start_game'});
document.getElementById('waitingBackBtn').onclick=()=>{send({type:'leave_room'});currentRoomId=null;showScreen('lobbyScreen');send({type:'list_rooms'})};
document.getElementById('gameExitBtn').onclick=()=>{gameActive=false;send({type:'leave_room'});currentRoomId=null;showScreen('lobbyScreen');send({type:'list_rooms'})};
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const W=900,H=580;
canvas.width=W;canvas.height=H;
const keys={};
const mouse={x:W/2,y:H/2};
const gk=['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '];
const korMap={'ㅈ':'w','ㅁ':'a','ㄴ':'s','ㅇ':'d'};
window.addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(korMap[k])k=korMap[k];keys[k]=true;if(gk.includes(k))e.preventDefault()});
window.addEventListener('keyup',e=>{let k=e.key.toLowerCase();if(korMap[k])k=korMap[k];keys[k]=false});
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height)});
const joy={left:{active:false,angle:0,dist:0},right:{active:false,angle:0,dist:0}};
function setupJoy(id,knobId,key){
  const el=document.getElementById(id),knob=document.getElementById(knobId);let tid=null,cx,cy;
  el.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];const r=el.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;tid=t.identifier;joy[key].active=true;move(e)},{passive:false});
  function move(e){for(const t of e.changedTouches){if(t.identifier===tid){let dx=t.clientX-cx,dy=t.clientY-cy;const d=Math.sqrt(dx*dx+dy*dy),mx=50;if(d>mx){dx=dx/d*mx;dy=dy/d*mx}knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;joy[key].angle=Math.atan2(dy,dx);joy[key].dist=Math.min(d/mx,1)}}}
  el.addEventListener('touchmove',move,{passive:false});
  function end(e){for(const t of e.changedTouches){if(t.identifier===tid){tid=null;joy[key].active=false;joy[key].dist=0;knob.style.transform='translate(-50%,-50%)'}}}
  el.addEventListener('touchend',end);el.addEventListener('touchcancel',end);
}
setupJoy('joyLeft','knobLeft','left');setupJoy('joyRight','knobRight','right');
function castRay(ox,oy,a,md){const s=8,cosA=Math.cos(a),sinA=Math.sin(a);let d=0;while(d<md){d+=s;const px=ox+cosA*d,py=oy+sinA*d;if(px<0||px>mapW||py<0||py>mapH)return d;for(let i=0;i<rayWalls.length;i++){const w=rayWalls[i];if(px>=w.x&&px<=w.x+w.w&&py>=w.y&&py<=w.y+w.h)return d}}return md}
let rayWalls=[];
function isVis(sx,sy,sa,px,py){const dx=px-sx,dy=py-sy,d=Math.sqrt(dx*dx+dy*dy);if(d>VIEW_DIST)return false;let ad=Math.atan2(dy,dx)-sa;while(ad>Math.PI)ad-=Math.PI*2;while(ad<-Math.PI)ad+=Math.PI*2;if(Math.abs(ad)>FOV)return false;return castRay(sx,sy,Math.atan2(dy,dx),d)>=d-5}
function startGame(d){
  myId=d.yourId;seekerId=d.seekerId;isSeeker=d.isSeeker;gamePlayers=d.players;gameWalls=d.walls;gameActive=true;
  seekerName=d.seekerName||'???';
  if(d.mapW)mapW=d.mapW;if(d.mapH)mapH=d.mapH;
  const me=d.players.find(p=>p.id===myId);
  if(me){localX=me.x;localY=me.y;localAngle=me.angle;localVX=0;localVY=0}
  predictionActive=false;startOverlayTimer=180;lastFrame=0;lastTick=0;
  for(const k in interp)delete interp[k];
  showScreen('gameScreen');canvas.focus();
  canvas.style.width=Math.min(900,window.innerWidth)+'px';
  canvas.style.height=Math.min(580,window.innerHeight-40)+'px';
  requestAnimationFrame(gameLoop);
}
function circleRectLocal(cx,cy,cr,rx,ry,rw,rh){const clx=Math.max(rx,Math.min(cx,rx+rw)),cly=Math.max(ry,Math.min(cy,ry+rh)),dx=cx-clx,dy=cly-cy;return dx*dx+dy*dy<cr*cr}
function canMoveLocal(x,y,r){if(x-r<0||x+r>mapW||y-r<0||y+r>mapH)return false;for(const w of gameWalls)if(circleRectLocal(x,y,r,w.x,w.y,w.w,w.h))return false;return true}
let localX=0,localY=0,localVX=0,localVY=0,localAngle=0,predictionActive=false;
const interp={};
function getMoveVector(){
  let mx=0,my=0;
  if(joy.right.active){mx=Math.cos(joy.right.angle)*joy.right.dist;my=Math.sin(joy.right.angle)*joy.right.dist}
  else{if(keys.w||keys.arrowup)my-=1;if(keys.s||keys.arrowdown)my+=1;if(keys.a||keys.arrowleft)mx-=1;if(keys.d||keys.arrowright)mx+=1;if(mx&&my){mx*=.707;my*=.707}}
  return {mx,my};
}
function updateLocal(dt){
  if(!gameActive)return;
  const me=gamePlayers.find(p=>p.id===myId);if(!me)return;
  if(me.caught&&!me.isSeeker){localVX=0;localVY=0;return}
  const {mx,my}=getMoveVector();
  if(joy.left.active){localAngle=joy.left.angle}else{localAngle=Math.atan2(mouse.y-H/2,mouse.x-W/2)}
  const pxPerSec=(me.isSeeker?7.5:5.25)*30*0.94;
  const smoothing=1-Math.pow(0.45,dt*30);
  localVX+=((mx*pxPerSec)-localVX)*smoothing;
  localVY+=((my*pxPerSec)-localVY)*smoothing;
  if(Math.abs(localVX)<1)localVX=0;if(Math.abs(localVY)<1)localVY=0;
  const r=me.isSeeker?16:14;
  const nx=localX+localVX*dt,ny=localY+localVY*dt;
  if(canMoveLocal(nx,localY,r))localX=nx;
  if(canMoveLocal(localX,ny,r))localY=ny;
  predictionActive=true;
}
function sendInput(){
  if(!gameActive)return;
  const me=gamePlayers.find(p=>p.id===myId);if(!me)return;
  if(me.caught&&!me.isSeeker)return;
  const {mx,my}=getMoveVector();
  send({type:'input',moveX:mx,moveY:my,angle:localAngle});
}
function wallKind(w,i){
  if(w.w<20||w.h<20)return 'fence';
  return (i%5===0||w.w*w.h<18000)?'rock':'tree';
}
function blobPath(cx,cy,r,points,phase){
  ctx.beginPath();
  for(let i=0;i<=points;i++){
    const a=Math.PI*2*i/points;
    const rr=r*(1+Math.sin(a*3+phase)*0.09+Math.sin(a*7+phase*0.7)*0.05);
    const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function drawFlatField(camX,camY){
  ctx.fillStyle='#82b348';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.025)';
  for(let i=0;i<80;i++){
    const x=((i*173)%mapW)-camX,y=((i*269)%mapH)-camY;
    if(x<-30||x>W+30||y<-30||y>H+30)continue;
    ctx.beginPath();ctx.arc(x,y,12+(i%4)*7,0,Math.PI*2);ctx.fill();
  }
  const grid=400;
  ctx.strokeStyle='rgba(53,90,31,.28)';ctx.lineWidth=2;
  const startX=-(camX%grid),startY=-(camY%grid);
  for(let x=startX;x<W;x+=grid){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=startY;y<H;y+=grid){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.strokeStyle='rgba(42,65,28,.36)';ctx.lineWidth=5;ctx.strokeRect(-camX,-camY,mapW,mapH);
}
function drawTree(w,camX,camY,i){
  const cx=w.x+w.w/2-camX,cy=w.y+w.h/2-camY;
  const r=Math.max(w.w,w.h)*0.58;
  blobPath(cx,cy,r,22,i*0.9);
  ctx.fillStyle='#35502b';ctx.fill();
  blobPath(cx-8,cy-10,r*0.75,20,i*1.2);
  ctx.fillStyle='rgba(46,77,35,.65)';ctx.fill();
  blobPath(cx,cy,r*0.34,14,i*1.4);
  ctx.fillStyle='#4b2a0d';ctx.fill();
  ctx.strokeStyle='#1f271d';ctx.lineWidth=5;ctx.stroke();
}
function drawRock(w,camX,camY,i){
  const cx=w.x+w.w/2-camX,cy=w.y+w.h/2-camY;
  const r=Math.max(w.w,w.h)*0.45;
  blobPath(cx,cy,r,12,i*0.8);
  ctx.fillStyle='#9d9d9a';ctx.fill();
  ctx.strokeStyle='#2d2b2d';ctx.lineWidth=5;ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.32)';
  ctx.beginPath();ctx.arc(cx-r*0.25,cy-r*0.28,r*0.28,0,Math.PI*2);ctx.fill();
}
function drawFence(w,camX,camY){
  const sx=w.x-camX,sy=w.y-camY;
  ctx.fillStyle='#587032';ctx.fillRect(sx,sy,w.w,w.h);
  ctx.fillStyle='rgba(0,0,0,.16)';ctx.fillRect(sx+2,sy+2,Math.max(0,w.w-4),Math.max(0,w.h-4));
}
function drawPlayerFlat(p,x,y,angle,isMe){
  const r=(p.radius||14)*(p.isSeeker?1.35:1.22);
  const base=p.isSeeker?'#ff766f':(characters[p.charIdx]?.color||'#ffc86f');
  ctx.fillStyle='rgba(41,36,27,.22)';
  ctx.beginPath();ctx.ellipse(x+3,y+8,r*1.05,r*0.46,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=base;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#2b241f';ctx.lineWidth=isMe?5:4;ctx.stroke();
  const ax=Math.cos(angle),ay=Math.sin(angle);
  ctx.fillStyle='#ffc56d';ctx.strokeStyle='#2b241f';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(x+ax*r*0.95-ay*r*0.55,y+ay*r*0.95+ax*r*0.55,r*0.34,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(x+ax*r*0.95+ay*r*0.55,y+ay*r*0.95-ax*r*0.55,r*0.34,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.38)';
  ctx.beginPath();ctx.arc(x-ax*r*0.18-ay*r*0.2,y-ay*r*0.18+ax*r*0.2,r*0.18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(32,28,22,.78)';ctx.font='bold 11px "Noto Sans KR"';ctx.textAlign='center';
  ctx.fillText(p.name,x,y-r-10);
}
function drawMiniMap(myX,myY,myAngle){
  const mw=138,mh=96,x=14,y=H-mh-14,sx=mw/mapW,sy=mh/mapH;
  ctx.fillStyle='rgba(29,47,24,.72)';ctx.fillRect(x,y,mw,mh);
  ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=3;ctx.strokeRect(x,y,mw,mh);
  for(let i=0;i<gameWalls.length;i++){
    const w=gameWalls[i],kind=wallKind(w,i);
    ctx.fillStyle=kind==='rock'?'#bebebe':kind==='tree'?'#27451f':'#4f672f';
    ctx.fillRect(x+w.x*sx,y+w.y*sy,Math.max(2,w.w*sx),Math.max(2,w.h*sy));
  }
  for(const p of gamePlayers){
    if(p.caught&&!p.isSeeker)continue;
    ctx.fillStyle=p.id===myId?'#fff':p.isSeeker?'#f25f5c':'#ffd06f';
    ctx.beginPath();ctx.arc(x+p.x*sx,y+p.y*sy,p.id===myId?4:3,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='#7cff5b';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+myX*sx,y+myY*sy);ctx.lineTo(x+(myX+Math.cos(myAngle)*260)*sx,y+(myY+Math.sin(myAngle)*260)*sy);ctx.stroke();
}
function drawGame(){
  ctx.clearRect(0,0,W,H);
  const me=gamePlayers.find(p=>p.id===myId);
  if(!me){ctx.fillStyle='#82b348';ctx.fillRect(0,0,W,H);return}
  const myX=predictionActive?localX:me.x,myY=predictionActive?localY:me.y,myAngle=predictionActive?localAngle:me.angle;
  const camX=myX-W/2,camY=myY-H/2;
  drawFlatField(camX,camY);
  const vr=VIEW_DIST+20;rayWalls=[];
  for(let i=0;i<gameWalls.length;i++){const w=gameWalls[i];if(w.x+w.w<myX-vr||w.x>myX+vr||w.y+w.h<myY-vr||w.y>myY+vr)continue;rayWalls.push(w)}
  for(let i=0;i<gameWalls.length;i++){
    const w=gameWalls[i],sx=w.x-camX,sy=w.y-camY;
    if(sx+w.w+80<0||sx>W+80||sy+w.h+80<0||sy>H+80)continue;
    const kind=wallKind(w,i);
    if(kind==='tree')drawTree(w,camX,camY,i);
    else if(kind==='rock')drawRock(w,camX,camY,i);
    else drawFence(w,camX,camY);
  }
  for(const p of gamePlayers){
    if(p.id===myId)continue;if(p.caught&&!p.isSeeker)continue;
    if(!interp[p.id])interp[p.id]={x:p.x,y:p.y};
    interp[p.id].x+=(p.x-interp[p.id].x)*0.25;interp[p.id].y+=(p.y-interp[p.id].y)*0.25;
    const sx=interp[p.id].x-camX,sy=interp[p.id].y-camY;
    if(sx<-50||sx>W+50||sy<-50||sy>H+50)continue;
    if(!isVis(myX,myY,myAngle,interp[p.id].x,interp[p.id].y))continue;
    drawPlayerFlat(p,sx,sy,p.angle,false);
  }
  drawPlayerFlat(me,W/2,H/2,myAngle,true);
  drawMiniMap(myX,myY,myAngle);
  const hud=document.getElementById('gameHudText'),caught=gamePlayers.filter(p=>!p.isSeeker&&p.caught).length,total=gamePlayers.filter(p=>!p.isSeeker).length;
  if(isSeeker){hud.textContent='🔴 술래: '+seekerName+' | 잡은 수: '+caught+'/'+total}else{hud.textContent='🔴 술래: '+seekerName+(me.caught?' | ⚠️ 잡힘!':'')}
  if(startOverlayTimer>0){startOverlayTimer--;const alpha=Math.min(1,startOverlayTimer/30);ctx.fillStyle='rgba(38,55,27,'+alpha*0.62+')';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,'+alpha+')';ctx.font='bold 28px "Noto Sans KR"';ctx.textAlign='center';ctx.fillText('🔴 술래: '+seekerName,W/2,H/2-10);ctx.font='16px "Noto Sans KR"';ctx.fillStyle='rgba(255,255,255,'+alpha*0.72+')';ctx.fillText(isSeeker?'당신이 술래입니다!':'술래를 피해 도망치세요!',W/2,H/2+30)}
}
let lastTick=0,lastFrame=0;
function gameLoop(t){
  if(!gameActive)return;
  if(!lastFrame)lastFrame=t;
  let dt=(t-lastFrame)/1000;if(dt>0.033)dt=0.033;lastFrame=t;
  updateLocal(dt);
  if(t-lastTick>1000/30){sendInput();lastTick=t}
  drawGame();
  requestAnimationFrame(gameLoop);
}
</script>
</body>
